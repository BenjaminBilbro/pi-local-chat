<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pi chat</title>
<style>
  :root {
    --teal: #3d7d7a;
    --teal-dark: #2d5f5c;
    --teal-light: #4a9a96;
    --cream: #fffacd;
    --cream-dim: #f5f5a0;
    --bg: #0e1a19;
    --surface: #162222;
    --surface2: #1c2e2d;
    --text: #e8f0ef;
    --text-dim: #8aaaA8;
    --radius: 12px;
    /* account accent defaults (overridden per-account) */
    --accent: var(--teal);
    --accent-glow: rgba(61, 125, 122, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    max-width: 100vw;
    overflow-x: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ── Login Screen ─────────────────────────────────────────────── */

  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    height: 100vh;
    background: var(--bg);
  }

  #login-screen.hidden { display: none; }

  .login-title {
    font-size: 24px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.5px;
  }

  .login-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: -16px;
  }

  .login-icons {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .login-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--surface2);
    background: var(--surface);
    color: var(--text);
    font-size: 32px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-icon:hover {
    border-color: var(--text-dim);
    transform: scale(1.05);
  }

  .login-icon.selected-b {
    border-color: var(--teal-dark);
    background: var(--teal-dark);
    color: var(--cream);
    box-shadow: 0 0 20px rgba(45, 95, 92, 0.4);
  }

  .login-icon.selected-r {
    border-color: var(--teal-light);
    background: var(--teal-light);
    color: var(--cream);
    box-shadow: 0 0 20px rgba(74, 154, 150, 0.4);
  }

  .login-password-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: min(320px, calc(100vw - 32px));
  }

  .login-password-area.active { display: flex; }

  .login-password-area input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--surface2);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-size: 16px;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }

  .login-password-area input:focus {
    border-color: var(--accent);
  }

  .login-password-area button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: var(--cream);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .login-password-area button:hover {
    filter: brightness(1.1);
  }

  .login-error {
    color: #e06060;
    font-size: 13px;
    min-height: 20px;
  }

  /* ── Chat Screen ──────────────────────────────────────────────── */

  #chat-screen { display: none; flex-direction: column; height: 100vh; }
  #chat-screen.active { display: flex; }

  /* Header */
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
    flex-shrink: 0;
  }

  .chat-header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--cream);
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    background: var(--surface2);
    border: none;
    color: var(--text-dim);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-icon:hover { background: var(--accent); color: var(--cream); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }

  .status-dot.connected { background: #4ade80; }
  .status-dot.thinking { background: #facc15; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    -webkit-overflow-scrolling: touch;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  .message {
    max-width: 720px;
    width: 100%;
    align-self: flex-start;
  }

  .message.user { align-self: flex-end; }

  .message-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    color: var(--text-dim);
  }

  .message.user .message-label { text-align: right; }

  .message-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.assistant .message-bubble {
    background: var(--surface);
    border: 1px solid var(--surface2);
  }

  .message.user .message-bubble {
    background: var(--accent);
    color: var(--cream);
  }

  /* Image in user message */
  .message-bubble img.user-image {
    max-width: 300px;
    max-height: 200px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: block;
  }

  /* Timeline */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
  }

  .timeline-item {
    flex-shrink: 0;
  }

  .timeline-item.thinking {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-dim);
    opacity: 0.6;
    padding: 4px 0 4px 18px;
    white-space: pre-wrap;
    position: relative;
  }

  .timeline-item.thinking::before {
    content: "";
    position: absolute;
    left: 4px;
    top: 10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    opacity: 0.4;
  }

  .timeline-item.tool {
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--cream-dim);
    padding: 4px 0 4px 18px;
    position: relative;
  }

  .timeline-item.tool::before {
    content: "";
    position: absolute;
    left: 4px;
    top: 9px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cream-dim);
    opacity: 0.6;
  }

  .timeline-item.tool .tool-name::before {
    content: "⚡ ";
  }

  .timeline-item.text-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--surface2);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 720px;
  }

  .timeline-connector {
    width: 2px;
    height: 16px;
    background: var(--surface2);
    margin-left: 9px;
    flex-shrink: 0;
  }

  /* Waiting indicator */
  .waiting-indicator {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 12px 0;
    color: var(--text-dim);
    font-size: 13px;
  }

  .waiting-indicator.active {
    display: flex;
  }

  .waiting-dots {
    display: flex;
    gap: 4px;
  }

  .waiting-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: waiting-bounce 1.2s infinite;
  }

  .waiting-dots span:nth-child(2) { animation-delay: 0.15s; }
  .waiting-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes waiting-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* Input Area */
  .input-area {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--surface2);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    max-width: 720px;
    margin: 0 auto;
  }

  .input-wrapper {
    flex: 1;
    position: relative;
  }

  .input-wrapper textarea {
    width: 100%;
    padding: 12px 16px;
    padding-right: 44px;
    border: 1px solid var(--surface2);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 150px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .input-wrapper textarea:focus { border-color: var(--accent); }

  .input-actions {
    position: absolute;
    right: 8px;
    bottom: 8px;
    display: flex;
    gap: 4px;
  }

  .input-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
    display: flex;
    align-items: center;
  }

  .input-btn:hover { color: var(--cream-dim); }

  .send-btn {
    width: 46px;
    height: 46px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: var(--cream);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { filter: brightness(1.15); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Image preview */
  .image-preview {
    display: none;
    padding: 8px 20px;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }

  .image-preview.active { display: block; }

  .image-preview-inner {
    position: relative;
    display: inline-block;
  }

  .image-preview img {
    height: 60px;
    border-radius: 8px;
    border: 1px solid var(--surface2);
  }

  .image-preview .remove-image {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--surface2);
    border: none;
    color: var(--text);
    width: 18px;
    height: 18px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Hidden file input */
  #image-input { display: none; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .welcome h2 {
    font-size: 20px;
    color: var(--cream);
    margin-bottom: 8px;
  }

  .welcome p { font-size: 14px; }

  /* ── Mobile Responsive ──────────────────────────────────────────── */

  @media (max-width: 600px) {
    .session-panel {
      width: 100vw;
    }

    .login-icons {
      gap: 24px;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      font-size: 26px;
    }

    .chat-header {
      padding: 10px 12px;
    }

    .chat-header h1 {
      font-size: 15px;
    }

    .btn-icon {
      padding: 8px;
      font-size: 0;
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
    }

    .messages {
      padding: 12px;
      gap: 12px;
    }

    .message-bubble {
      padding: 10px 14px;
      font-size: 15px;
    }

    .timeline-item.thinking {
      font-size: 14px;
      padding: 4px 0 4px 16px;
    }

    .timeline-item.tool {
      font-size: 13px;
      padding: 4px 0 4px 16px;
    }

    .timeline-item.text-bubble {
      font-size: 15px;
      padding: 10px 14px;
    }

    .timeline-connector {
      margin-left: 7px;
    }

    .input-area {
      padding: 10px 12px;
    }

    .image-preview {
      padding: 8px 12px;
    }
  }

  /* ── Markdown Rendering ─────────────────────────────────────────── */

  .markdown-content p { margin: 0 0 0.6em 0; }
  .markdown-content p:last-child { margin-bottom: 0; }

  .markdown-content code {
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.9em;
  }

  .markdown-content pre {
    background: rgba(0,0,0,0.4);
    padding: 12px 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .markdown-content pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  .markdown-content strong { font-weight: 600; }

  .markdown-content em { font-style: italic; }

  .markdown-content ul, .markdown-content ol {
    margin: 4px 0;
    padding-left: 20px;
  }

  .markdown-content li { margin: 2px 0; }

  .markdown-content a {
    color: var(--cream-dim);
    text-decoration: none;
  }

  .markdown-content a:hover { text-decoration: underline; }

  .markdown-content blockquote {
    border-left: 3px solid var(--surface2);
    padding-left: 12px;
    color: var(--text-dim);
    margin: 8px 0;
  }

  .markdown-content h1, .markdown-content h2, .markdown-content h3 {
    margin: 8px 0 4px 0;
    font-weight: 600;
  }

  .markdown-content h1 { font-size: 1.2em; }
  .markdown-content h2 { font-size: 1.1em; }
  .markdown-content h3 { font-size: 1em; }

  .markdown-content hr {
    border: none;
    border-top: 1px solid var(--surface2);
    margin: 12px 0;
  }

  .markdown-content table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
    font-size: 13px;
  }

  .markdown-content th, .markdown-content td {
    border: 1px solid var(--surface2);
    padding: 6px 10px;
    text-align: left;
  }

  .markdown-content th {
    background: rgba(0,0,0,0.2);
    font-weight: 600;
  }

  /* ── Session Panel ──────────────────────────────────────────────── */

  .session-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
  }

  .session-backdrop.active { display: block; }

  .session-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: min(380px, 85vw);
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--surface2);
    z-index: 100;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
  }

  .session-panel.active { transform: translateX(0); }

  .session-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--surface2);
    flex-shrink: 0;
  }

  .session-panel-header h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--cream);
  }

  .session-panel-close {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
  }

  .session-panel-close:hover { color: var(--text); }

  .session-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .session-panel-body::-webkit-scrollbar { width: 4px; }
  .session-panel-body::-webkit-scrollbar-track { background: transparent; }
  .session-panel-body::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .session-item {
    padding: 12px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
  }

  .session-item:hover { background: var(--surface2); }

  .session-item.loading-session { opacity: 0.5; pointer-events: none; }

  .session-item-preview {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .session-item-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .session-panel-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  .session-panel-loading {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  .session-panel-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--surface2);
    border-top-color: var(--text-dim);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading overlay for session load */
  .session-load-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 80;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .session-load-overlay.active { display: flex; }

  /* Historical assistant message (non-timeline) */
  .message.assistant .historical-text {
    padding: 12px 16px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--surface2);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.assistant .historical-thinking {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-dim);
    opacity: 0.6;
    margin-bottom: 6px;
    white-space: pre-wrap;
  }

  .message.assistant .historical-tool {
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--cream-dim);
    margin-bottom: 4px;
  }

  .message.assistant .historical-tool .tool-name::before {
    content: "⚡ ";
  }

  /* ── Sub-agent Tool Item (live streaming) ──────────────────────────── */

  .subagent-tool {
    border: 1px solid var(--surface2);
    border-left: 3px solid var(--cream-dim);
    border-radius: 8px;
    background: var(--surface);
    margin: 4px 0 4px 0;
    overflow: hidden;
    max-width: 720px;
  }

  .subagent-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .subagent-header:hover { background: var(--surface2); }

  .subagent-icon {
    font-size: 14px;
    flex-shrink: 0;
  }

  .subagent-name {
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-weight: 600;
    color: var(--cream-dim);
    flex-shrink: 0;
  }

  .subagent-task {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .subagent-chevron {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .subagent-chevron.open { transform: rotate(180deg); }

  .subagent-body {
    display: none;
    padding: 0 12px 10px 12px;
    border-top: 1px solid var(--surface2);
  }

  .subagent-body.open { display: block; }

  .subagent-status {
    font-size: 12px;
    color: var(--text-dim);
    padding: 8px 0;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 80px;
    overflow-y: auto;
  }

  .subagent-status::-webkit-scrollbar { width: 3px; }
  .subagent-status::-webkit-scrollbar-track { background: transparent; }
  .subagent-status::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .subagent-active-tool {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--teal-light);
    padding: 4px 0;
  }

  .subagent-active-tool::before {
    content: "▶";
    font-size: 8px;
  }

  .subagent-active-tool.done {
    color: #4ade80;
  }

  .subagent-active-tool.done::before {
    content: "✓";
    font-size: 10px;
  }

  .subagent-turns {
    font-size: 10px;
    color: var(--text-dim);
    padding: 2px 0;
    opacity: 0.6;
  }

  /* ── Historical Sub-agent Tool Calls (collapsible) ─────────────────── */

  .historical-subagent {
    border: 1px solid var(--surface2);

  }

  .historical-subagent-header {

  .historical-subagent-summary {
    font-size: 12px;
    color: var(--text-dim);
    padding: 8px 0;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;

  .historical-subagent-status {

  .historical-subagent-status.failed {
    color: #e06060;
    background: rgba(224, 96, 96, 0.1);
  }
</style>

<script src="/static/marked.min.js"></script>
<script>
// ── Marked Config ──────────────────────────────────────────────────────

marked.setOptions({
  breaks: true,        // support GFM line breaks
  gfm: true,           // GitHub Flavored Markdown
});

// ── Auth (SHA-256 hash comparison, dual accounts) ──────────────────────

const ACCOUNTS = {
  b: { hash: '69b881c987b2c1a324b5c6139bc6e874b1787823baaf2e15307b3f950391c5db', accent: '#2d5f5c', label: 'Ben' },
  r: { hash: '6e45bdd24c7f96268677a186aa2a4245acd58a1a02d76649c070d306f5461ab8', accent: '#4a9a96', label: 'Roxy' }
};

async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const loginScreen = document.getElementById('login-screen');
const chatScreen  = document.getElementById('chat-screen');
const passphraseInput = document.getElementById('passphrase');
const loginBtn    = document.getElementById('login-btn');
const loginError  = document.getElementById('login-error');
const passwordArea = document.getElementById('login-password-area');
const iconB = document.getElementById('icon-b');
const iconR = document.getElementById('icon-r');

let selectedAccount = null; // 'b' or 'r'

function selectAccount(account) {
  selectedAccount = account;
  loginError.textContent = '';
  passphraseInput.value = '';

  // Toggle icon states
  iconB.className = 'login-icon' + (account === 'b' ? ' selected-b' : '');
  iconR.className = 'login-icon' + (account === 'r' ? ' selected-r' : '');

  // Set accent color for password area
  const acct = ACCOUNTS[account];
  document.documentElement.style.setProperty('--accent', acct.accent);

  // Show password area
  passwordArea.classList.add('active');
  passphraseInput.focus();
}

iconB.addEventListener('click', () => selectAccount('b'));
iconR.addEventListener('click', () => selectAccount('r'));

async function attemptLogin() {
  if (!selectedAccount) return;
  const hash = await sha256(passphraseInput.value);
  const acct = ACCOUNTS[selectedAccount];

  if (hash === acct.hash) {
    // Apply cream accent glow
    document.documentElement.style.setProperty('--accent-glow', acct.accent + '26');
    loginScreen.classList.add('hidden');
    chatScreen.classList.add('active');
    initChat();
  } else {
    loginError.textContent = 'Incorrect password';
    passphraseInput.value = '';
    passphraseInput.focus();
  }
}

loginBtn.addEventListener('click', attemptLogin);
passphraseInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

// ── Chat ─────────────────────────────────────────────────────────────────

let ws = null;
let isStreaming = false;
let assistantContainer = null;  // single .message.assistant per agent run
let pendingImage = null; // { data: base64, mimeType: string }

const messagesEl   = document.getElementById('messages');
const userInput    = document.getElementById('user-input');
const sendBtn      = document.getElementById('send-btn');
const newSessionBtn = document.getElementById('new-session-btn');
const statusDot    = document.getElementById('status-dot');
const imageInput   = document.getElementById('image-input');
const attachBtn    = document.getElementById('attach-btn');
const imagePreview = document.getElementById('image-preview');
const previewImg   = document.getElementById('preview-img');
const removeImageBtn = document.getElementById('remove-image');
const waitingIndicator = document.getElementById('waiting-indicator');

function showWaiting() {
  waitingIndicator.classList.add('active');
  scrollToBottom();
}

function hideWaiting() {
  waitingIndicator.classList.remove('active');
}

function initChat() {
  connectWS();
  userInput.focus();
}

// ── Event Handling ───────────────────────────────────────────────────────

const seenToolIds = new Set(); // track tool call IDs per turn
let timeline = null;           // the .timeline container
let lastTimelineItem = null;   // last appended DOM element (for connectors)
let currentThinking = null;    // current thinking item state
let currentText = null;        // current text bubble state
let firstContentReceived = false; // track if any content streamed this turn

// Sub-agent tracking
const subagentTools = new Map(); // toolCallId -> { el, header, body, statusEl, activeToolEl, turnsEl, name, expanded }
let lastSubagentUpdate = null;   // debounce: last text content seen

function addConnector() {
  const conn = document.createElement('div');
  conn.className = 'timeline-connector';
  timeline.appendChild(conn);
  lastTimelineItem = conn;
}

function handleEvent(event) {
  const type = event.type;

  if (type === 'agent_start') {
    statusDot.className = 'status-dot thinking';
    removeWelcome();
    assistantContainer = createAssistantContainer();
    timeline = document.createElement('div');
    timeline.className = 'timeline';
    assistantContainer.appendChild(timeline);
    timeline.appendChild(waitingIndicator);
    lastTimelineItem = null;
    messagesEl.appendChild(assistantContainer);
    showWaiting();
  }

  if (type === 'message_start') {
    const msg = event.message || {};
    if (msg.role === 'assistant') {
      seenToolIds.clear();
      currentThinking = null;
      currentText = null;
      firstContentReceived = false;
    }
  }

  if (type === 'message_update') {
    const aev = event.assistantMessageEvent || {};
    const aType = aev.type;

    // Streaming text chunks
    if (aType === 'text_delta') {
      isStreaming = true;
      if (!firstContentReceived) { firstContentReceived = true; hideWaiting(); }
      if (!currentText) {
        if (lastTimelineItem) addConnector();
        currentText = createTextItem();
      }
      appendText(currentText, aev.delta);
    }

    // Finalize text from authoritative complete content
    if (aType === 'text_end' && currentText) {
      finalizeText(currentText, aev.content);
    }

    // Streaming thinking chunks
    if (aType === 'thinking_delta') {
      if (!firstContentReceived) { firstContentReceived = true; hideWaiting(); }
      if (!currentThinking) {
        if (lastTimelineItem) addConnector();
        currentThinking = createThinkingItem();
        timeline.appendChild(currentThinking.el);
        lastTimelineItem = currentThinking.el;
      }
      appendThinking(currentThinking, aev.delta);
    }

    // Finalize thinking from authoritative complete content
    if (aType === 'thinking_end' && currentThinking) {
      finalizeThinking(currentThinking, aev.content);
    }

    // Tool call complete
    if (aType === 'toolcall_end') {
      if (!firstContentReceived) { firstContentReceived = true; hideWaiting(); }
      const toolCall = aev.toolCall || {};
      const toolId = toolCall.id;
      const toolName = toolCall.name;
      if (toolName && toolId && !seenToolIds.has(toolId)) {
        seenToolIds.add(toolId);
        if (lastTimelineItem) addConnector();
        // For subagent tools, create a special expandable card (if not already created)
        if (toolName === 'subagent') {
          if (!subagentTools.has(toolId)) {
            const args = toolCall.arguments || {};
            const agentName = args.name || 'sub-agent';
            const task = args.task || '';
            const toolEl = createSubagentToolItem(toolId, agentName, task);
            timeline.appendChild(toolEl);
            lastTimelineItem = toolEl;
          }
        } else {
          const toolEl = createToolItem(toolName);
          timeline.appendChild(toolEl);
          lastTimelineItem = toolEl;
        }
        scrollToBottom();
      }
    }
  }

  // ── Tool execution events ──────────────────────────────────────────

  if (type === 'tool_execution_start') {
    const toolName = event.toolName;
    const toolCallId = event.toolCallId;
    // If this is a subagent that wasn't created via toolcall_end yet, create it
    if (toolName === 'subagent' && toolCallId && !subagentTools.has(toolCallId)) {
      const args = event.args || {};
      const agentName = args.name || 'sub-agent';
      const task = args.task || '';
      if (!firstContentReceived) { firstContentReceived = true; hideWaiting(); }
      if (lastTimelineItem) addConnector();
      const toolEl = createSubagentToolItem(toolCallId, agentName, task);
      timeline.appendChild(toolEl);
      lastTimelineItem = toolEl;
      scrollToBottom();
    }
  }

  if (type === 'tool_execution_update') {
    const toolName = event.toolName;
    const toolCallId = event.toolCallId;
    if (toolName === 'subagent' && toolCallId) {
      updateSubagentToolItem(toolCallId, event);
    }
  }

  if (type === 'tool_execution_end') {
    const toolName = event.toolName;
    const toolCallId = event.toolCallId;
    if (toolName === 'subagent' && toolCallId) {
      finalizeSubagentToolItem(toolCallId, event);
    }
  }

  if (type === 'message_end') {
    const msg = event.message || {};
    if (msg.role === 'assistant') {
      // Remove empty text item
      if (currentText && !currentText.hasText && currentText.el.parentNode) {
        currentText.el.remove();
        // Also remove the connector before it
        if (lastTimelineItem instanceof Element && lastTimelineItem.previousElementSibling?.className === 'timeline-connector') {
          lastTimelineItem.previousElementSibling.remove();
        }
      }
      currentThinking = null;
      currentText = null;
    }
  }

  if (type === 'agent_settled') {
    statusDot.className = 'status-dot connected';
    hideWaiting();
    // Move waiting indicator back to messagesEl for next turn
    messagesEl.appendChild(waitingIndicator);
    isStreaming = false;
    sendBtn.disabled = false;
    assistantContainer = null;
    timeline = null;
    lastTimelineItem = null;
    currentThinking = null;
    currentText = null;
    subagentTools.clear();
    lastSubagentUpdate = null;
  }
}

// ── Message Rendering ────────────────────────────────────────────────────

function removeWelcome() {
  const w = messagesEl.querySelector('.welcome');
  if (w) w.remove();
}

function createUserMessage(text, imageData) {
  removeWelcome();
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="message-label">you</div>`;
  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  if (imageData) {
    const img = document.createElement('img');
    img.className = 'user-image';
    img.src = imageData;
    bubble.appendChild(img);
  }

  const textNode = document.createElement('span');
  textNode.textContent = text;
  bubble.appendChild(textNode);

  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollToBottom();
}

// Single assistant container per agent run
function createAssistantContainer() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = 'assistant';
  div.appendChild(label);
  return div;
}

// Thinking timeline item
function createThinkingItem() {
  const el = document.createElement('div');
  el.className = 'timeline-item thinking';
  return { el, hasText: false, textSpan: null };
}

function appendThinking(item, delta) {
  if (!item.hasText) {
    item.hasText = true;
    item.textSpan = document.createElement('span');
    item.el.appendChild(item.textSpan);
  }
  item.textSpan.textContent += delta;
  scrollToBottom();
}

function finalizeThinking(item, completeText) {
  if (!completeText) return;
  if (item.textSpan) {
    item.textSpan.textContent = completeText;
  } else {
    item.textSpan = document.createElement('span');
    item.el.appendChild(item.textSpan);
    item.textSpan.textContent = completeText;
  }
  scrollToBottom();
}

// Tool timeline item
function createToolItem(toolName) {
  const el = document.createElement('div');
  el.className = 'timeline-item tool';
  const nameSpan = document.createElement('span');
  nameSpan.className = 'tool-name';
  nameSpan.textContent = toolName;
  el.appendChild(nameSpan);
  return el;
}

// ── Sub-agent Tool Item Functions ──────────────────────────────────────

function createSubagentToolItem(toolCallId, agentName, task) {
  const el = document.createElement('div');
  el.className = 'timeline-item';
  el.style.padding = '4px 0 4px 18px';
  el.style.position = 'relative';

  // Dot indicator
  const dot = document.createElement('div');
  dot.style.cssText = 'position:absolute;left:4px;top:12px;width:6px;height:6px;border-radius:50%;background:var(--cream-dim);opacity:0.6;';
  el.appendChild(dot);

  const card = document.createElement('div');
  card.className = 'subagent-tool';

  // Header
  const header = document.createElement('div');
  header.className = 'subagent-header';
  header.innerHTML = `
    <span class="subagent-icon">🤖</span>
    <span class="subagent-name">${escapeHtml(agentName)}</span>
    <span class="subagent-task">${escapeHtml(task)}</span>
    <span class="subagent-chevron">▼</span>
  `;

  // Body
  const body = document.createElement('div');
  body.className = 'subagent-body';

  const statusEl = document.createElement('div');
  statusEl.className = 'subagent-status';
  statusEl.textContent = '(running...)';

  const activeToolEl = document.createElement('div');
  activeToolEl.className = 'subagent-active-tool';
  activeToolEl.style.display = 'none';

  const turnsEl = document.createElement('div');
  turnsEl.className = 'subagent-turns';

  body.appendChild(statusEl);
  body.appendChild(activeToolEl);
  body.appendChild(turnsEl);

  card.appendChild(header);
  card.appendChild(body);
  el.appendChild(card);

  // Toggle expand
  header.addEventListener('click', () => {
    const isOpen = body.classList.toggle('open');
    header.querySelector('.subagent-chevron').classList.toggle('open', isOpen);
  });

  // Auto-expand on creation
  body.classList.add('open');
  header.querySelector('.subagent-chevron').classList.add('open');

  subagentTools.set(toolCallId, {
    el, header, body, statusEl, activeToolEl, turnsEl, name: agentName, expanded: true
  });

  return el;
}

function updateSubagentToolItem(toolCallId, event) {
  const state = subagentTools.get(toolCallId);
  if (!state) return;

  const partial = event.partialResult || {};
  const content = partial.content || [];
  const details = partial.details || {};
  const results = details.results || [];

  // Update status text (debounce: only update if different)
  let statusText = '';
  for (const c of content) {
    if (c.type === 'text' && c.text) {
      statusText = c.text;
      break;
    }
  }

  if (statusText && statusText !== lastSubagentUpdate) {
    state.statusEl.textContent = statusText;
    lastSubagentUpdate = statusText;
  }

  // Update active tool
  if (results.length > 0) {
    const result = results[0];
    const activeTools = result.activeToolExecutions || [];

    if (activeTools.length > 0) {
      const active = activeTools[0];
      state.activeToolEl.style.display = 'flex';
      state.activeToolEl.className = 'subagent-active-tool';
      const args = active.args || {};
      const argDesc = args.command || args.prompt || JSON.stringify(args);
      state.activeToolEl.textContent = `${active.toolName}: ${argDesc.substring(0, 80)}`;
    } else {
      state.activeToolEl.style.display = 'none';
    }

    // Update turns
    const turns = result.usage?.turns || 0;
    const maxTurns = result.maxTurnsLimit || 0;
    state.turnsEl.textContent = maxTurns ? `${turns}/${maxTurns} turns` : `${turns} turns`;
  }

  scrollToBottom();
}

function finalizeSubagentToolItem(toolCallId, event) {
  const state = subagentTools.get(toolCallId);
  if (!state) return;

  const result = event.result || {};
  const content = result.content || [];

  // Get final status text
  let finalText = '';
  for (const c of content) {
    if (c.type === 'text' && c.text) {
      finalText = c.text;
      break;
    }
  }

  // Extract receipt info if available
  let status = 'completed';
  let summary = '';
  for (const c of content) {
    if (c.type === 'text' && c.text) {
      const text = c.text;
      // Check for PI_SUBAGENT_RECEIPT_V1
      if (text.includes('PI_SUBAGENT_RECEIPT_V1')) {
        const jsonStart = text.indexOf('{');
        if (jsonStart >= 0) {
          try {
            const receipt = JSON.parse(text.substring(jsonStart));
            status = receipt.status || 'completed';
            summary = receipt.summary || '';
          } catch {}
        }
      }
    }
  }

  // Update status with final result
  if (summary) {
    state.statusEl.textContent = summary;
  } else if (finalText && !finalText.startsWith('PI_SUBAGENT_RECEIPT')) {
    state.statusEl.textContent = finalText;
  }

  // Hide active tool, mark done
  state.activeToolEl.style.display = 'none';

  // Update turns to final
  const isError = event.isError;
  if (isError) {
    state.statusEl.style.color = '#e06060';
  }

  lastSubagentUpdate = null;
}

// Text bubble timeline item
function createTextItem() {
  const el = document.createElement('div');
  el.className = 'timeline-item text-bubble';
  return { el, hasText: false, contentEl: null, rawText: '' };
}

function renderMarkdown(item) {
  if (!item.contentEl) {
    item.contentEl = document.createElement('div');
    item.contentEl.className = 'markdown-content';
    item.el.appendChild(item.contentEl);
  }
  const text = item.rawText.replace(/\n+$/, '');
  item.contentEl.innerHTML = marked.parse(text, { async: false });
}

function appendText(item, text) {
  if (!item.hasText) {
    item.hasText = true;
    timeline.appendChild(item.el);
    lastTimelineItem = item.el;
  }
  item.rawText += text;
  renderMarkdown(item);
  scrollToBottom();
}

function finalizeText(item, completeText) {
  if (!item.hasText || !completeText) return;
  item.rawText = completeText;
  renderMarkdown(item);
  scrollToBottom();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Sending Messages ─────────────────────────────────────────────────────

function sendMessage() {
  const text = userInput.value.trim();
  if (!text && !pendingImage) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  // Show user message
  const imageData = pendingImage ? `data:${pendingImage.mimeType};base64,${pendingImage.data}` : null;
  createUserMessage(text, imageData);

  // Build WS message
  const wsMsg = { type: 'prompt', message: text };
  if (pendingImage) {
    wsMsg.images = [{
      type: 'image',
      data: pendingImage.data,
      mimeType: pendingImage.mimeType
    }];
  }

  ws.send(JSON.stringify(wsMsg));

  // Reset
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;
  clearPendingImage();
  isStreaming = true;
}

// ── Image Handling ───────────────────────────────────────────────────────

attachBtn.addEventListener('click', () => imageInput.click());

imageInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const raw = ev.target.result;
    const base64Start = raw.indexOf(',');
    pendingImage = {
      data: raw.substring(base64Start + 1),
      mimeType: file.type
    };
    previewImg.src = raw;
    imagePreview.classList.add('active');
    updateSendBtn();
  };
  reader.readAsDataURL(file);
  imageInput.value = '';
});

removeImageBtn.addEventListener('click', clearPendingImage);

function clearPendingImage() {
  pendingImage = null;
  imagePreview.classList.remove('active');
  previewImg.src = '';
  updateSendBtn();
}

// ── Input Handling ───────────────────────────────────────────────────────

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
  updateSendBtn();
});

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function updateSendBtn() {
  const hasText = userInput.value.trim().length > 0;
  sendBtn.disabled = !(hasText || pendingImage);
}

// ── New Session ──────────────────────────────────────────────────────────

newSessionBtn.addEventListener('click', () => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'new_session' }));
    // Clear messages
    const msgs = messagesEl.querySelectorAll('.message, .welcome');
    msgs.forEach(el => el.remove());
    hideWaiting();
    // Move waiting indicator back to messagesEl (it may be in a timeline)
    messagesEl.appendChild(waitingIndicator);
    // Re-add welcome
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.innerHTML = '<h2>New Session</h2><p>Start a fresh conversation</p>';
    messagesEl.insertBefore(welcome, waitingIndicator);
    currentAssistantMsg = null;
    currentThoughtsSection = null;
    isStreaming = false;
    sendBtn.disabled = false;
  }
});

// ── Session Panel ────────────────────────────────────────────────────────

const sessionMenuBtn = document.getElementById('session-menu-btn');
const sessionPanel = document.getElementById('session-panel');
const sessionBackdrop = document.getElementById('session-backdrop');
const sessionPanelClose = document.getElementById('session-panel-close');
const sessionPanelBody = document.getElementById('session-panel-body');
const sessionLoadOverlay = document.getElementById('session-load-overlay');

function openSessionPanel() {
  sessionPanel.classList.add('active');
  sessionBackdrop.classList.add('active');
  fetchSessions();
}

function closeSessionPanel() {
  sessionPanel.classList.remove('active');
  sessionBackdrop.classList.remove('active');
}

sessionMenuBtn.addEventListener('click', openSessionPanel);
sessionPanelClose.addEventListener('click', closeSessionPanel);
sessionBackdrop.addEventListener('click', closeSessionPanel);

// ── Fetch Sessions ───────────────────────────────────────────────────────

async function fetchSessions() {
  sessionPanelBody.innerHTML = '<div class="session-panel-loading"><span class="session-panel-spinner"></span>Loading sessions...</div>';

  try {
    const resp = await fetch('/api/sessions');
    const data = await resp.json();
    const sessions = data.sessions || [];

    if (sessions.length === 0) {
      sessionPanelBody.innerHTML = '<div class="session-panel-empty">No sessions found</div>';
      return;
    }

    sessionPanelBody.innerHTML = '';
    sessions.forEach(session => {
      const item = document.createElement('div');
      item.className = 'session-item';
      item.dataset.path = session.path;

      const preview = session.firstMessage || 'Empty session';
      const time = formatTimestamp(session.timestamp);
      const count = session.messageCount;

      item.innerHTML = `
        <div class="session-item-preview">${escapeHtml(preview)}</div>
        <div class="session-item-meta">
          <span>${count} message${count !== 1 ? 's' : ''}</span>
          <span>${time}</span>
        </div>
      `;

      item.addEventListener('click', () => {
        if (item.classList.contains('loading-session')) return;
        loadSession(session.path, session.id);
      });

      sessionPanelBody.appendChild(item);
    });
  } catch (e) {
    sessionPanelBody.innerHTML = `<div class="session-panel-empty">Failed to load sessions: ${escapeHtml(e.message)}</div>`;
  }
}

// ── Load Session ─────────────────────────────────────────────────────────

function loadSession(sessionPath, sessionId) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  // Mark item as loading
  const items = sessionPanelBody.querySelectorAll('.session-item');
  items.forEach(item => {
    if (item.dataset.path === sessionPath) {
      item.classList.add('loading-session');
    }
  });

  // Show overlay
  sessionLoadOverlay.classList.add('active');

  // Send load_session via WebSocket
  ws.send(JSON.stringify({ type: 'load_session', sessionPath }));
}

// ── Handle session_loaded WS event ───────────────────────────────────────

function handleSessionLoaded(msg) {
  const { messages, sessionId, messageCount } = msg;
  if (!messages || messages.length === 0) return;

  // Clear current messages
  const existing = messagesEl.querySelectorAll('.message, .welcome');
  existing.forEach(el => el.remove());

  // Render historical messages
  renderHistoricalMessages(messages);

  // Update send button
  isStreaming = false;
  sendBtn.disabled = false;

  // Move waiting indicator back to messagesEl
  messagesEl.appendChild(waitingIndicator);
}

function handleMessagesRetrieved(msg) {
  if (msg.messages && msg.messages.length > 0) {
    renderHistoricalMessages(msg.messages);
  }
}

function handleSessionError(msg) {
  sessionLoadOverlay.classList.remove('active');
  // Un-mark loading items
  sessionPanelBody.querySelectorAll('.session-item.loading-session')
    .forEach(item => item.classList.remove('loading-session'));

  // Show error as a message
  const errorDiv = document.createElement('div');
  errorDiv.className = 'message assistant';
  errorDiv.innerHTML = `
    <div class="message-label">error</div>
    <div class="message-bubble" style="background:#3d1f1f;border-color:#5d2f2f;color:#e06060;">${escapeHtml(msg.message || 'Unknown error')}</div>
  `;
  messagesEl.appendChild(errorDiv);
}

// Override ws.onmessage in connectWS to handle new types
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
  // Pass ?session=PATH param to WebSocket (dev-mode session loading)
  const sessionParam = new URLSearchParams(location.search).get('session');
  const wsUrl = sessionParam
    ? `${protocol}://${location.host}/ws?session=${encodeURIComponent(sessionParam)}`
    : `${protocol}://${location.host}/ws`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    statusDot.className = 'status-dot connected';
    if (selectedAccount) {
      ws.send(JSON.stringify({ type: 'set_account', account: selectedAccount }));
    }
  };

  ws.onclose = () => {
    statusDot.className = 'status-dot';
    setTimeout(connectWS, 2000);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'session_started') {
      statusDot.className = 'status-dot connected';
    } else if (msg.type === 'session_loaded') {
      sessionLoadOverlay.classList.remove('active');
      closeSessionPanel();
      handleSessionLoaded(msg);
    } else if (msg.type === 'messages_retrieved') {
      sessionLoadOverlay.classList.remove('active');
      handleMessagesRetrieved(msg);
    } else if (msg.type === 'error') {
      // Check if this is a session-related error
      if (sessionLoadOverlay.classList.contains('active')) {
        handleSessionError(msg);
      }
    } else if (msg.type === 'pi_event') {
      handleEvent(msg.event);
    }
  };
}

// ── Render Historical Messages ───────────────────────────────────────────

function renderHistoricalMessages(messages) {
  // The messages from pi RPC are in the format:
  // { role: 'user'|'assistant', content: [{ type: 'text'|'thinking'|'tool_result', ... }] }
  // or simplified { role, content: 'text string' }

  messages.forEach(msg => {
    const role = msg.role;
    if (role === 'user') {
      renderHistoricalUserMessage(msg);
    } else if (role === 'assistant') {
      renderHistoricalAssistantMessage(msg);
    }
    // Skip 'toolResult' messages - they're internal to tool execution
  });

  scrollToBottom();
}

function renderHistoricalUserMessage(msg) {
  removeWelcome();
  const div = document.createElement('div');
  div.className = 'message user';
  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = 'you';
  div.appendChild(label);

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  // Handle content array or string
  const content = msg.content;
  if (Array.isArray(content)) {
    content.forEach(c => {
      if (c.type === 'image' && c.data) {
        const img = document.createElement('img');
        img.className = 'user-image';
        img.src = `data:${c.mimeType || 'image/png'};base64,${c.data}`;
        bubble.appendChild(img);
      } else if (c.type === 'text' && c.text) {
        const textNode = document.createElement('span');
        textNode.textContent = c.text;
        bubble.appendChild(textNode);
      }
    });
  } else if (typeof content === 'string') {
    bubble.textContent = content;
  }

  div.appendChild(bubble);
  messagesEl.appendChild(div);
}

function renderHistoricalAssistantMessage(msg) {
  removeWelcome();
  const div = document.createElement('div');
  div.className = 'message assistant';
  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = 'assistant';
  div.appendChild(label);

  const content = msg.content;
  if (!content) return;

  // Handle content array (structured) or string
  // Pi RPC message format:
  //   thinking: { type: 'thinking', thinking: '...', thinkingSignature: 'reasoning_content' }
  //   toolCall: { type: 'toolCall', id: '...', name: 'bash', arguments: {...} }
  //   text:     { type: 'text', text: '...' }
  if (Array.isArray(content)) {
    content.forEach(c => {
      if (c.type === 'thinking' && c.thinking) {
        const thinking = document.createElement('div');
        thinking.className = 'historical-thinking';
        thinking.textContent = c.thinking;
        div.appendChild(thinking);
      } else if (c.type === 'toolCall' && c.name === 'subagent') {
        // Sub-agent tool call - collapsible with nested tool calls
        renderHistoricalSubagentTool(div, c);
      } else if (c.type === 'toolCall' && c.name) {
        const tool = document.createElement('div');
        tool.className = 'historical-tool';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'tool-name';
        nameSpan.textContent = c.name;
        tool.appendChild(nameSpan);
        div.appendChild(tool);
      } else if (c.type === 'text' && c.text) {
        const textDiv = document.createElement('div');
        textDiv.className = 'historical-text markdown-content';
        textDiv.innerHTML = marked.parse(c.text, { async: false });
        div.appendChild(textDiv);
      }
    });
  } else if (typeof content === 'string') {
    const textDiv = document.createElement('div');
    textDiv.className = 'historical-text markdown-content';
    textDiv.innerHTML = marked.parse(content, { async: false });
    div.appendChild(textDiv);
  }

  messagesEl.appendChild(div);
}

// ── Historical Sub-agent Tool Renderer ──────────────────────────────────

function renderHistoricalSubagentTool(container, toolCall) {
  const args = toolCall.arguments || {};
  const agentName = args.name || 'sub-agent';
  const task = args.task || '';
  const status = toolCall._status || '';
  const summary = toolCall._summary || '';
  const isError = toolCall._isError || false;

  const div = document.createElement('div');
  div.className = 'historical-subagent';

  // Header
  const header = document.createElement('div');
  header.className = 'historical-subagent-header';

  const icon = document.createElement('span');
  icon.className = 'historical-subagent-icon';
  icon.textContent = '🤖';
  header.appendChild(icon);

  const nameSpan = document.createElement('span');
  nameSpan.className = 'historical-subagent-name';
  nameSpan.textContent = agentName;
  header.appendChild(nameSpan);

  // Status badge
  if (status || isError) {
    const statusBadge = document.createElement('span');
    statusBadge.className = 'historical-subagent-status ' + (isError ? 'failed' : (status || 'completed'));
    statusBadge.textContent = isError ? 'failed' : (status || 'completed');
    header.appendChild(statusBadge);
  }

  const chevron = document.createElement('span');
  chevron.className = 'historical-subagent-chevron';
  chevron.textContent = '▼';
  header.appendChild(chevron);

  // Body
  const body = document.createElement('div');
  body.className = 'historical-subagent-body';

  // Task description
  if (task) {
    const taskDiv = document.createElement('div');
    taskDiv.className = 'historical-subagent-summary';
    taskDiv.textContent = task;
    body.appendChild(taskDiv);
  }

  // Tool calls container
  const toolCallsDiv = document.createElement('div');
  toolCallsDiv.className = 'historical-subagent-tool-calls';

  const toolCalls = extractSubagentToolCalls(toolCall);
  toolCalls.forEach(tc => {
    const item = document.createElement('div');
    item.className = 'historical-subagent-tool-call';
    const nameSpan = document.createElement('span');
    nameSpan.className = 'hsc-tool-name';
    nameSpan.textContent = tc.name;
    item.appendChild(nameSpan);
    if (tc.args) {
      const argsSpan = document.createElement('span');
      argsSpan.className = 'hsc-tool-args';
      argsSpan.textContent = tc.args;
      item.appendChild(argsSpan);
    }
    toolCallsDiv.appendChild(item);
  });

  if (toolCallsDiv.children.length > 0) {
    body.appendChild(toolCallsDiv);
  }

  // Summary
  if (summary) {
    const summaryDiv = document.createElement('div');
    summaryDiv.className = 'historical-subagent-summary markdown-content';
    summaryDiv.innerHTML = marked.parse(summary, { async: false });
    body.appendChild(summaryDiv);
  }

  div.appendChild(header);
  div.appendChild(body);
  container.appendChild(div);

  // Toggle
  header.addEventListener('click', () => {
    const isOpen = body.classList.toggle('open');
    header.querySelector('.historical-subagent-chevron').classList.toggle('open', isOpen);
  });
}

function extractSubagentToolCalls(toolCall) {
  // The server attaches _toolCalls to the toolCall object for historical sessions
  // Also check arguments._toolCalls for compatibility
  const calls = toolCall._toolCalls || toolCall.arguments?._toolCalls || [];
  const results = [];

  for (const tc of calls) {
    const name = tc.name || tc.toolName || 'unknown';
    const argStr = tc.args || tc.arguments || '';
    const argText = typeof argStr === 'string' ? argStr : JSON.stringify(argStr);
    results.push({ name, args: argText.substring(0, 120) });
  }

  return results;
}

// ── Utilities ────────────────────────────────────────────────────────────

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatTimestamp(ts) {
  if (!ts) return '';
  try {
    const date = new Date(ts);
    const now = new Date();
    const diff = now - date;
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);

    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    if (days < 7) return `${days}d ago`;
    return date.toLocaleDateString();
  } catch {
    return ts;
  }
}
