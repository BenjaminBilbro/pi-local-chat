<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pi chat</title>
<style>
  :root {
    --teal: #3d7d7a;
    --teal-dark: #2d5f5c;
    --teal-light: #4a9a96;
    --cream: #fffacd;
    --cream-dim: #f5f5a0;
    --bg: #0e1a19;
    --surface: #162222;
    --surface2: #1c2e2d;
    --text: #e8f0ef;
    --text-dim: #8aaaA8;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    max-width: 100vw;
    overflow-x: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ── Login Screen ─────────────────────────────────────────────── */

  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--bg);
  }

  #login-screen.hidden { display: none; }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: var(--radius);
    padding: 48px 40px;
    text-align: center;
    width: min(360px, calc(100vw - 32px));
  }

  .login-card h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--teal-light);
  }

  .login-card p {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .login-card input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--surface2);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-card input:focus {
    border-color: var(--teal);
  }

  .login-card button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--teal);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .login-card button:hover { background: var(--teal-dark); }

  .login-error {
    color: #e06060;
    font-size: 13px;
    margin-top: 8px;
    min-height: 20px;
  }

  /* ── Chat Screen ──────────────────────────────────────────────── */

  #chat-screen { display: none; flex-direction: column; height: 100vh; }
  #chat-screen.active { display: flex; }

  /* Header */
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
    flex-shrink: 0;
  }

  .chat-header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--teal-light);
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    background: var(--surface2);
    border: none;
    color: var(--text-dim);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-icon:hover { background: var(--teal); color: #fff; }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }

  .status-dot.connected { background: #4ade80; }
  .status-dot.thinking { background: #facc15; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    -webkit-overflow-scrolling: touch;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  .message {
    max-width: 720px;
    width: 100%;
    align-self: flex-start;
  }

  .message.user { align-self: flex-end; }

  .message-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    color: var(--text-dim);
  }

  .message.user .message-label { text-align: right; }

  .message-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.assistant .message-bubble {
    background: var(--surface);
    border: 1px solid var(--surface2);
  }

  .message.user .message-bubble {
    background: var(--teal);
    color: #fff;
  }

  /* Image in user message */
  .message-bubble img.user-image {
    max-width: 300px;
    max-height: 200px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: block;
  }

  /* Timeline */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
  }

  .timeline-item {
    flex-shrink: 0;
  }

  .timeline-item.thinking {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-dim);
    opacity: 0.6;
    padding: 4px 0 4px 18px;
    white-space: pre-wrap;
    position: relative;
  }

  .timeline-item.thinking::before {
    content: "";
    position: absolute;
    left: 4px;
    top: 10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    opacity: 0.4;
  }

  .timeline-item.tool {
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--teal-light);
    padding: 4px 0 4px 18px;
    position: relative;
  }

  .timeline-item.tool::before {
    content: "";
    position: absolute;
    left: 4px;
    top: 9px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal-light);
    opacity: 0.6;
  }

  .timeline-item.tool .tool-name::before {
    content: "⚡ ";
  }

  .timeline-item.text-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--surface2);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 720px;
  }

  .timeline-connector {
    width: 2px;
    height: 16px;
    background: var(--surface2);
    margin-left: 9px;
    flex-shrink: 0;
  }

  /* Cursor blink */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--teal-light);
    animation: blink 0.8s infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Input Area */
  .input-area {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--surface2);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    max-width: 720px;
    margin: 0 auto;
  }

  .input-wrapper {
    flex: 1;
    position: relative;
  }

  .input-wrapper textarea {
    width: 100%;
    padding: 12px 16px;
    padding-right: 44px;
    border: 1px solid var(--surface2);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 150px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .input-wrapper textarea:focus { border-color: var(--teal); }

  .input-actions {
    position: absolute;
    right: 8px;
    bottom: 8px;
    display: flex;
    gap: 4px;
  }

  .input-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
    display: flex;
    align-items: center;
  }

  .input-btn:hover { color: var(--teal-light); }

  .send-btn {
    width: 46px;
    height: 46px;
    border: none;
    border-radius: var(--radius);
    background: var(--teal);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--teal-dark); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Image preview */
  .image-preview {
    display: none;
    padding: 8px 20px;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }

  .image-preview.active { display: block; }

  .image-preview-inner {
    position: relative;
    display: inline-block;
  }

  .image-preview img {
    height: 60px;
    border-radius: 8px;
    border: 1px solid var(--surface2);
  }

  .image-preview .remove-image {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--surface2);
    border: none;
    color: var(--text);
    width: 18px;
    height: 18px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Hidden file input */
  #image-input { display: none; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .welcome h2 {
    font-size: 20px;
    color: var(--teal-light);
    margin-bottom: 8px;
  }

  .welcome p { font-size: 14px; }

  /* ── Mobile Responsive ──────────────────────────────────────────── */

  @media (max-width: 600px) {
    .login-card {
      padding: 32px 24px;
    }

    .chat-header {
      padding: 10px 12px;
    }

    .chat-header h1 {
      font-size: 15px;
    }

    .btn-icon {
      padding: 8px;
      font-size: 0;
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
    }

    .messages {
      padding: 12px;
      gap: 12px;
    }

    .message-bubble {
      padding: 10px 14px;
      font-size: 15px;
    }

    .timeline-item.thinking {
      font-size: 14px;
      padding: 4px 0 4px 16px;
    }

    .timeline-item.tool {
      font-size: 13px;
      padding: 4px 0 4px 16px;
    }

    .timeline-item.text-bubble {
      font-size: 15px;
      padding: 10px 14px;
    }

    .timeline-connector {
      margin-left: 7px;
    }

    .input-area {
      padding: 10px 12px;
    }

    .image-preview {
      padding: 8px 12px;
    }
  }

  /* ── Markdown Rendering ─────────────────────────────────────────── */

  .markdown-content p { margin: 0 0 0.6em 0; }
  .markdown-content p:last-child { margin-bottom: 0; }

  .markdown-content code {
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.9em;
  }

  .markdown-content pre {
    background: rgba(0,0,0,0.4);
    padding: 12px 16px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .markdown-content pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  .markdown-content strong { font-weight: 600; }

  .markdown-content em { font-style: italic; }

  .markdown-content ul, .markdown-content ol {
    margin: 4px 0;
    padding-left: 20px;
  }

  .markdown-content li { margin: 2px 0; }

  .markdown-content a {
    color: var(--teal-light);
    text-decoration: none;
  }

  .markdown-content a:hover { text-decoration: underline; }

  .markdown-content blockquote {
    border-left: 3px solid var(--surface2);
    padding-left: 12px;
    color: var(--text-dim);
    margin: 8px 0;
  }

  .markdown-content h1, .markdown-content h2, .markdown-content h3 {
    margin: 8px 0 4px 0;
    font-weight: 600;
  }

  .markdown-content h1 { font-size: 1.2em; }
  .markdown-content h2 { font-size: 1.1em; }
  .markdown-content h3 { font-size: 1em; }

  .markdown-content hr {
    border: none;
    border-top: 1px solid var(--surface2);
    margin: 12px 0;
  }

  .markdown-content table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
    font-size: 13px;
  }

  .markdown-content th, .markdown-content td {
    border: 1px solid var(--surface2);
    padding: 6px 10px;
    text-align: left;
  }

  .markdown-content th {
    background: rgba(0,0,0,0.2);
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <h1>pi chat</h1>
    <p>Enter passphrase to continue</p>
    <input type="password" id="passphrase" placeholder="Passphrase" autofocus>
    <button id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <div class="chat-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="status-dot" id="status-dot"></div>
      <h1>pi chat</h1>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="new-session-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New Session
      </button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <h2>Welcome</h2>
      <p>Start a conversation with pi</p>
    </div>
  </div>

  <div class="image-preview" id="image-preview">
    <div class="image-preview-inner">
      <img id="preview-img" src="" alt="preview">
      <button class="remove-image" id="remove-image">&times;</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Message pi..." rows="1"></textarea>
        <div class="input-actions">
          <button class="input-btn" id="attach-btn" title="Attach image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </button>
        </div>
      </div>
      <button class="send-btn" id="send-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <input type="file" id="image-input" accept="image/*">
</div>

<script src="/static/marked.min.js"></script>
<script>
// ── Marked Config ──────────────────────────────────────────────────────

marked.setOptions({
  breaks: true,        // support GFM line breaks
  gfm: true,           // GitHub Flavored Markdown
});

// ── Auth (SHA-256 hash comparison) ──────────────────────────────────────

const EXPECTED_HASH = 'f8136fccd88b668852df345965513a249835e5fa95b48129bdd9173779bb6dcb';

async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const loginScreen = document.getElementById('login-screen');
const chatScreen  = document.getElementById('chat-screen');
const passphraseInput = document.getElementById('passphrase');
const loginBtn    = document.getElementById('login-btn');
const loginError  = document.getElementById('login-error');

async function attemptLogin() {
  const hash = await sha256(passphraseInput.value);
  if (hash === EXPECTED_HASH) {
    loginScreen.classList.add('hidden');
    chatScreen.classList.add('active');
    initChat();
  } else {
    loginError.textContent = 'Incorrect passphrase';
    passphraseInput.value = '';
    passphraseInput.focus();
  }
}

loginBtn.addEventListener('click', attemptLogin);
passphraseInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

// ── Chat ─────────────────────────────────────────────────────────────────

let ws = null;
let isStreaming = false;
let assistantContainer = null;  // single .message.assistant per agent run
let pendingImage = null; // { data: base64, mimeType: string }

const messagesEl   = document.getElementById('messages');
const userInput    = document.getElementById('user-input');
const sendBtn      = document.getElementById('send-btn');
const newSessionBtn = document.getElementById('new-session-btn');
const statusDot    = document.getElementById('status-dot');
const imageInput   = document.getElementById('image-input');
const attachBtn    = document.getElementById('attach-btn');
const imagePreview = document.getElementById('image-preview');
const previewImg   = document.getElementById('preview-img');
const removeImageBtn = document.getElementById('remove-image');

function initChat() {
  connectWS();
  userInput.focus();
}

function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${protocol}://${location.host}/ws`);

  ws.onopen = () => {
    statusDot.className = 'status-dot connected';
  };

  ws.onclose = () => {
    statusDot.className = 'status-dot';
    setTimeout(connectWS, 2000);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'session_started') {
      statusDot.className = 'status-dot connected';
    } else if (msg.type === 'pi_event') {
      handleEvent(msg.event);
    }
  };
}

// ── Event Handling ───────────────────────────────────────────────────────

const seenToolIds = new Set(); // track tool call IDs per turn
let timeline = null;           // the .timeline container
let lastTimelineItem = null;   // last appended DOM element (for connectors)
let currentThinking = null;    // current thinking item state
let currentText = null;        // current text bubble state

function addConnector() {
  const conn = document.createElement('div');
  conn.className = 'timeline-connector';
  timeline.appendChild(conn);
  lastTimelineItem = conn;
}

function handleEvent(event) {
  const type = event.type;

  if (type === 'agent_start') {
    statusDot.className = 'status-dot thinking';
    removeWelcome();
    assistantContainer = createAssistantContainer();
    timeline = document.createElement('div');
    timeline.className = 'timeline';
    assistantContainer.appendChild(timeline);
    lastTimelineItem = null;
    messagesEl.appendChild(assistantContainer);
  }

  if (type === 'message_start') {
    const msg = event.message || {};
    if (msg.role === 'assistant') {
      seenToolIds.clear();
      currentThinking = null;
      currentText = null;
    }
  }

  if (type === 'message_update') {
    const aev = event.assistantMessageEvent || {};
    const aType = aev.type;

    // Streaming text chunks
    if (aType === 'text_delta') {
      isStreaming = true;
      if (!currentText) {
        if (lastTimelineItem) addConnector();
        currentText = createTextItem();
      }
      appendText(currentText, aev.delta);
    }

    // Finalize text from authoritative complete content
    if (aType === 'text_end' && currentText) {
      finalizeText(currentText, aev.content);
    }

    // Streaming thinking chunks
    if (aType === 'thinking_delta') {
      if (!currentThinking) {
        if (lastTimelineItem) addConnector();
        currentThinking = createThinkingItem();
        timeline.appendChild(currentThinking.el);
        lastTimelineItem = currentThinking.el;
      }
      appendThinking(currentThinking, aev.delta);
    }

    // Finalize thinking from authoritative complete content
    if (aType === 'thinking_end' && currentThinking) {
      finalizeThinking(currentThinking, aev.content);
    }

    // Tool call complete
    if (aType === 'toolcall_end') {
      const toolCall = aev.toolCall || {};
      const toolId = toolCall.id;
      const toolName = toolCall.name;
      if (toolName && toolId && !seenToolIds.has(toolId)) {
        seenToolIds.add(toolId);
        if (lastTimelineItem) addConnector();
        const toolEl = createToolItem(toolName);
        timeline.appendChild(toolEl);
        lastTimelineItem = toolEl;
        scrollToBottom();
      }
    }
  }

  if (type === 'message_end') {
    const msg = event.message || {};
    if (msg.role === 'assistant') {
      // Remove cursor from text block
      if (currentText && currentText.cursor) {
        currentText.cursor.remove();
      }
      // Remove empty text item
      if (currentText && !currentText.hasText && currentText.el.parentNode) {
        currentText.el.remove();
        // Also remove the connector before it
        if (lastTimelineItem instanceof Element && lastTimelineItem.previousElementSibling?.className === 'timeline-connector') {
          lastTimelineItem.previousElementSibling.remove();
        }
      }
      currentThinking = null;
      currentText = null;
    }
  }

  if (type === 'agent_settled') {
    statusDot.className = 'status-dot connected';
    isStreaming = false;
    sendBtn.disabled = false;
    assistantContainer = null;
    timeline = null;
    lastTimelineItem = null;
    currentThinking = null;
    currentText = null;
  }
}

// ── Message Rendering ────────────────────────────────────────────────────

function removeWelcome() {
  const w = messagesEl.querySelector('.welcome');
  if (w) w.remove();
}

function createUserMessage(text, imageData) {
  removeWelcome();
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="message-label">you</div>`;
  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  if (imageData) {
    const img = document.createElement('img');
    img.className = 'user-image';
    img.src = imageData;
    bubble.appendChild(img);
  }

  const textNode = document.createElement('span');
  textNode.textContent = text;
  bubble.appendChild(textNode);

  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollToBottom();
}

// Single assistant container per agent run
function createAssistantContainer() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = 'assistant';
  div.appendChild(label);
  return div;
}

// Thinking timeline item
function createThinkingItem() {
  const el = document.createElement('div');
  el.className = 'timeline-item thinking';
  return { el, hasText: false, textSpan: null };
}

function appendThinking(item, delta) {
  if (!item.hasText) {
    item.hasText = true;
    item.textSpan = document.createElement('span');
    item.el.appendChild(item.textSpan);
  }
  item.textSpan.textContent += delta;
  scrollToBottom();
}

function finalizeThinking(item, completeText) {
  if (!completeText) return;
  if (item.textSpan) {
    item.textSpan.textContent = completeText;
  } else {
    item.textSpan = document.createElement('span');
    item.el.appendChild(item.textSpan);
    item.textSpan.textContent = completeText;
  }
  scrollToBottom();
}

// Tool timeline item
function createToolItem(toolName) {
  const el = document.createElement('div');
  el.className = 'timeline-item tool';
  const nameSpan = document.createElement('span');
  nameSpan.className = 'tool-name';
  nameSpan.textContent = toolName;
  el.appendChild(nameSpan);
  return el;
}

// Text bubble timeline item
function createTextItem() {
  const el = document.createElement('div');
  el.className = 'timeline-item text-bubble';
  return { el, hasText: false, contentEl: null, rawText: '', cursor: null };
}

function renderMarkdown(item) {
  if (!item.contentEl) {
    item.contentEl = document.createElement('div');
    item.contentEl.className = 'markdown-content';
    item.el.appendChild(item.contentEl);
  }
  item.contentEl.innerHTML = marked.parse(item.rawText, { async: false });
}

function appendText(item, text) {
  if (!item.hasText) {
    item.hasText = true;
    item.cursor = document.createElement('span');
    item.cursor.className = 'cursor';
    timeline.appendChild(item.el);
    lastTimelineItem = item.el;
  }
  item.rawText += text;
  renderMarkdown(item);
  // Keep cursor after content
  if (!item.el.contains(item.cursor)) {
    item.el.appendChild(item.cursor);
  }
  scrollToBottom();
}

function finalizeText(item, completeText) {
  if (!item.hasText || !completeText) return;
  item.rawText = completeText;
  renderMarkdown(item);
  scrollToBottom();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Sending Messages ─────────────────────────────────────────────────────

function sendMessage() {
  const text = userInput.value.trim();
  if (!text && !pendingImage) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  // Show user message
  const imageData = pendingImage ? `data:${pendingImage.mimeType};base64,${pendingImage.data}` : null;
  createUserMessage(text, imageData);

  // Build WS message
  const wsMsg = { type: 'prompt', message: text };
  if (pendingImage) {
    wsMsg.images = [{
      type: 'image',
      data: pendingImage.data,
      mimeType: pendingImage.mimeType
    }];
  }

  ws.send(JSON.stringify(wsMsg));

  // Reset
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;
  clearPendingImage();
  isStreaming = true;
}

// ── Image Handling ───────────────────────────────────────────────────────

attachBtn.addEventListener('click', () => imageInput.click());

imageInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const raw = ev.target.result;
    const base64Start = raw.indexOf(',');
    pendingImage = {
      data: raw.substring(base64Start + 1),
      mimeType: file.type
    };
    previewImg.src = raw;
    imagePreview.classList.add('active');
    updateSendBtn();
  };
  reader.readAsDataURL(file);
  imageInput.value = '';
});

removeImageBtn.addEventListener('click', clearPendingImage);

function clearPendingImage() {
  pendingImage = null;
  imagePreview.classList.remove('active');
  previewImg.src = '';
  updateSendBtn();
}

// ── Input Handling ───────────────────────────────────────────────────────

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
  updateSendBtn();
});

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function updateSendBtn() {
  const hasText = userInput.value.trim().length > 0;
  sendBtn.disabled = !(hasText || pendingImage);
}

// ── New Session ──────────────────────────────────────────────────────────

newSessionBtn.addEventListener('click', () => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'new_session' }));
    messagesEl.innerHTML = '<div class="welcome"><h2>New Session</h2><p>Start a fresh conversation</p></div>';
    currentAssistantMsg = null;
    currentThoughtsSection = null;
    isStreaming = false;
    sendBtn.disabled = false;
  }
});
</script>
</body>
</html>
