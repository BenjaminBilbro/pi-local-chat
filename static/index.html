<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pi chat</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/styles.css">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devchauhann/fonts@v1.1.0/cdn/v1/css/all.css">
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <button class="theme-toggle login-theme-toggle" data-theme-toggle type="button">
    <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor"/>
    </svg>
    <span data-theme-label>Theme</span>
  </button>
  <div class="login-title">pi chat</div>
  <div class="login-subtitle">Select your profile</div>
  <div class="login-icons">
    <button class="login-icon" id="icon-b" title="Ben">B</button>
    <button class="login-icon" id="icon-r" title="Roxy">R</button>
  </div>
  <div class="login-password-area" id="login-password-area">
    <input type="password" id="passphrase" placeholder="Password" autocomplete="current-password">
    <button id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Session Panel -->
<div class="session-backdrop" id="session-backdrop"></div>
<div class="session-panel" id="session-panel">
  <div class="session-panel-header">
    <h2>Sessions</h2>
    <button class="session-panel-close" id="session-panel-close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="session-panel-body" id="session-panel-body">
    <div class="session-panel-loading"><span class="session-panel-spinner"></span>Loading sessions...</div>
  </div>
</div>

<!-- Session Load Overlay -->
<div class="session-load-overlay" id="session-load-overlay">
  <span class="session-panel-spinner"></span>
  <span>Loading session...</span>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="chat-header-main">
      <button class="btn-icon" id="session-menu-btn" title="Sessions">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="status-dot" id="status-dot"></div>
      <h1>pi chat</h1>
    </div>
    <div class="header-actions">
      <button class="btn-icon theme-toggle" data-theme-toggle type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor"/>
        </svg>
        <span data-theme-label>Theme</span>
      </button>
      <button class="btn-icon" id="new-session-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New Session
      </button>
      <button class="btn-icon" id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <h2>Welcome</h2>
      <p>Start a conversation with pi</p>
    </div>
    <div class="waiting-indicator" id="waiting-indicator">
      <div class="waiting-dots"><span></span><span></span><span></span></div>
      <span>thinking</span>
    </div>
  </div>

  <div class="image-preview" id="image-preview">
    <div class="image-preview-inner">
      <img id="preview-img" src="" alt="preview">
      <button class="remove-image" id="remove-image">&times;</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Message pi..." rows="1"></textarea>
        <div class="input-actions">
          <button class="input-btn" id="attach-btn" title="Attach image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </button>
        </div>
      </div>
      <button class="send-btn" id="send-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <input type="file" id="image-input" accept="image/*">
</div>

<script src="/static/marked.min.js"></script>
<script type="module" src="/static/app.js"></script>
</body>
</html>
